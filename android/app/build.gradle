plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace = "com.example.ips_app_chileatiende"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_1_8
    }

defaultConfig {
    // Especifica tu propio Application ID.
    applicationId = "com.example.ips_app_chileatiende"
    
    // Especifica las versiones de SDK que tu aplicación soportará.
    minSdkVersion flutter.minSdkVersion
    targetSdkVersion flutter.targetSdkVersion
    
    // Configura la versión de la aplicación.
    versionCode flutter.versionCode
    versionName flutter.versionName
    
    // Define placeholders para las URIs de redirección de autenticación.
    manifestPlaceholders = [
        'appAuthRedirectScheme': 'com.example.ips_app_chileatiende'
    ]
}


    buildTypes {
        release {
            // TODO: Add your own signing config for the release build.
            // Signing with the debug keys for now, so `flutter run --release` works.
            signingConfig = signingConfigs.debug
        }
    }
}

flutter {
    source = "../.."
}
