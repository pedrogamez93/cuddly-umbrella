name: ips_app_chileatiende
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: 1.2.2
  uni_links: ^0.5.1
  webview_flutter: ^3.0.4
  flutter_secure_storage: ^5.0.2
  crypto: ^3.0.1
  convert: ^3.0.0
  flutter_appauth: ^3.0.1
  url_launcher: ^6.0.9
  flutter_html: ^3.0.0-beta.2
  oauth2: ^2.0.3
  uuid: ^3.0.7
  jwt_decoder: ^2.0.1
  carousel_slider: ^5.0.0
  timeago: ^3.7.0
  flutter_native_splash: ^2.4.4
  flutter_launcher_icons: ^0.14.3
  video_player: ^2.4.5
  chewie: ^1.6.4
  youtube_player_flutter: ^8.0.0
  web_socket_channel: ^2.4.4
  flutter_local_notifications: ^17.1.2
  flutter_dotenv: ^5.1.0
  provider: ^6.0.5
  cached_network_image: ^3.3.1
  cryptography: ^2.7.0  
  html_unescape: ^2.0.0

  # AUDIO (compatibles con Dart 3.5.x)
  just_audio: 0.9.44
  audio_session: 0.1.25

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/logo.png
    - assets/images/imagennotfound.png
    - assets/images/splash_logo.png
    - assets/images/clock.png
    - assets/images/date.png
    - assets/images/favorite.png
    - assets/images/home.png
    - assets/images/pod.png
    - assets/images/video.png
    - assets/images/news.png
    - assets/images/icono.png

flutter_native_splash:
  color: "#ffffff"
  image: assets/images/splash_logo.png
  android: true
  ios: true
  web: true
  fullscreen: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/icono.png"
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/images/icono.png"

# IMPORTANTE: esto va al mismo nivel que 'dependencies' y 'flutter'
dependency_overrides:
  just_audio: 0.9.44
  audio_session: 0.1.25
